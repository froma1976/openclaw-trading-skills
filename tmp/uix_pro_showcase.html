<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conviction AI | UIX Pro Showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #f472b6;
            --glass-bg: rgba(17, 24, 39, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --font-main: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 0% 0%, rgba(0, 242, 254, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(79, 172, 254, 0.1) 0%, transparent 50%);
            color: #f3f4f6;
            font-family: var(--font-main);
            margin: 0;
            padding: 40px;
            min-height: 100vh;
        }

        .showcase-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-weight: 800;
            font-size: 3rem;
            margin-bottom: 40px;
            background: linear-gradient(90deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        /* 1. Neural Glass Card */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: rgba(0, 242, 254, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 242, 254, 0.1);
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
        }

        .card h2 {
            font-size: 1.25rem;
            margin-top: 0;
            color: var(--primary);
            font-weight: 600;
        }

        /* 2. Holographic Badge */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(0, 242, 254, 0.1);
            color: var(--primary);
            border: 1px solid rgba(0, 242, 254, 0.2);
            position: relative;
            animation: breathe 3s infinite alternate;
        }

        @keyframes breathe {
            from {
                box-shadow: 0 0 5px rgba(0, 242, 254, 0.1);
                border-color: rgba(0, 242, 254, 0.2);
            }

            to {
                box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
                border-color: rgba(0, 242, 254, 0.5);
            }
        }

        /* 3. Data KPI with Glow */
        .kpi-value {
            font-family: var(--font-mono);
            font-size: 2.5rem;
            font-weight: 500;
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        /* 4. Action Button Pro */
        .btn-pro {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: #000;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-pro:hover {
            filter: brightness(1.1);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            transform: scale(1.02);
        }

        .muted {
            color: #9ca3af;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <h1>UIX Pro Concepts</h1>

    <div class="showcase-grid">
        <!-- CONCEPT 1: KPI NEURAL -->
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: start;">
                <h2>Equity Total</h2>
                <div class="badge">Live Data</div>
            </div>
            <div class="kpi-value">$124,500.82</div>
            <div class="muted">+4.2% desde la última sesión</div>
            <div style="margin-top: 20px; height: 4px; background: #374151; border-radius: 2px;">
                <div
                    style="width: 70%; height: 100%; background: var(--primary); border-radius: 2px; box-shadow: 0 0 10px var(--primary);">
                </div>
            </div>
        </div>

        <!-- CONCEPT 2: SIGNAL CARD -->
        <div class="card">
            <h2>Alerta de Trading</h2>
            <p class="muted">BTC/USDT - High Conviction Setup</p>
            <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin: 15px 0;">
                <code style="color: #6ee7b7;">CONFLUENCIA: 92%</code><br>
                <code style="color: #6ee7b7;">SENTIMIENTO: BULLISH</code>
            </div>
            <button class="btn-pro">Ejecutar Orden</button>
        </div>

        <!-- CONCEPT 3: NEURAL OVERLAY -->
        <div class="card">
            <h2>Estado del Sistema</h2>
            <div style="display: flex; align-items: center; gap: 10px; margin: 15px 0;">
                <div
                    style="width: 10px; height: 10px; border-radius: 50%; background: var(--primary); box-shadow: 0 0 10px var(--primary);">
                </div>
                <span>Agentes en sincronía</span>
            </div>
            <p class="muted">Análisis multivariable activo utilizando phi4-mini y qwen2.5.</p>
        </div>
    </div>
</body>

</html>
