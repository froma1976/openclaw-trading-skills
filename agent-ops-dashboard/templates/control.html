<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenClaw Control</title>
  <style>
    :root {
      --bg: #f4efe6;
      --ink: #1f1e1a;
      --muted: #6f6a5c;
      --line: #cdbca1;
      --panel: #fbf7f0;
      --accent: #234b4b;
      --accent-2: #8e4b2b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Segoe UI", serif;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at top left, #efe4cf 0, transparent 32%),
        linear-gradient(180deg, #f9f4ea 0, var(--bg) 100%);
    }

    .shell {
      padding: 18px 18px 12px;
      border-bottom: 1px solid var(--line);
      background: #f7f1e6cc;
      backdrop-filter: blur(10px);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: 0.02em;
    }

    .muted { color: var(--muted); }

    .tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      cursor: pointer;
      user-select: none;
      transition: .18s ease;
    }

    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 10px 24px #234b4b22;
    }

    .tab[data-url="/terminal"].active { background: #121a1c; border-color: #121a1c; }
    .tab[data-url="/sysadmin"].active { background: var(--accent-2); border-color: var(--accent-2); }

    .framewrap { flex: 1; min-height: 0; }

    iframe {
      width: 100%;
      height: calc(100vh - 116px);
      border: 0;
      background: #fff;
    }

    @media (max-width: 720px) {
      .topbar { display: block; }
      h1 { font-size: 24px; margin-bottom: 6px; }
      iframe { height: calc(100vh - 156px); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div>
        <div class="muted">Cabina unificada</div>
        <h1>OpenClaw Control</h1>
      </div>
      <div class="muted">Finanzas intacto en `/` + paneles extra separados</div>
    </div>

    <div class="tabs">
      <div class="tab active" data-url="/">Finanzas</div>
      <div class="tab" data-url="/lstm-real">LSTM Real</div>
      <div class="tab" data-url="/sysadmin">SysAdmin</div>
      <div class="tab" data-url="/terminal">Terminal</div>
      <div class="tab" data-url="/health">Health</div>
      <div class="tab" data-url="/docs">API Docs</div>
    </div>
  </div>

  <div class="framewrap">
    <iframe id="frame" src="/"></iframe>
  </div>

  <script>
    const tabs = Array.from(document.querySelectorAll('.tab'));
    const frame = document.getElementById('frame');

    function setActive(el, updateHash = true) {
      tabs.forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      frame.src = el.dataset.url;
      if (updateHash) {
        history.replaceState(null, '', '#tab=' + encodeURIComponent(el.dataset.url));
      }
    }

    tabs.forEach(t => t.addEventListener('click', () => setActive(t)));

    const hash = decodeURIComponent((location.hash || '').replace('#tab=', ''));
    const match = tabs.find(t => t.dataset.url === hash);
    if (match) setActive(match, false);
  </script>
</body>
</html>
