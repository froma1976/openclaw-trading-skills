name: strategy_clone_public_mql5_v1
version: 1
source: mql5_public_aggregated
warning: "Modelo aproximado: basado en métricas agregadas públicas, no en operaciones trade-by-trade."

analysis_summary:
  sample_signals: 12
  estimated_win_rate_pct: 64.41
  estimated_avg_risk_reward: 1.40
  estimated_avg_profit_factor: 1.35
  dominant_assets:
    - BTCUSD
    - CRYPTO (mix)
  inferred_style:
    - intradia
    - scalp_breakout
  best_market_conditions:
    - tendencia_alcista
    - momentum_alto

inferred_entry_signals:
  - name: breakout_momentum
    weight: 0.45
    conditions:
      - close_above_20bar_high: true
      - volume_ratio_min: 1.3
      - rsi_14_min: 55
  - name: trend_continuation
    weight: 0.35
    conditions:
      - ema_20_above_ema_50: true
      - pullback_to_ema_20: true
      - confirmation_candle: bullish_engulfing_or_pin
  - name: volatility_expansion
    weight: 0.20
    conditions:
      - atr_14_expanding: true
      - candle_range_gt_atr_x: 1.2

execution:
  assets:
    - BTCUSDT
    - SOLUSDT
  timeframe_primary: 15m
  timeframe_confirm: 1h
  session_mode: 24_7_crypto
  max_open_positions: 3
  position_sizing:
    risk_per_trade_pct: 0.75
    max_daily_risk_pct: 3.0

risk_management:
  stop_loss:
    method: atr
    atr_period: 14
    atr_multiplier: 1.2
  take_profit:
    method: fixed_rr
    rr_target: 1.4
  break_even:
    enable: true
    at_rr: 1.0
  trailing_stop:
    enable: true
    atr_multiplier: 1.0

filters:
  market_regime:
    only_trade_when:
      - adx_14_min: 20
      - trend_filter: ema_50_slope_positive
  avoid_conditions:
    - low_volume
    - spread_high
    - news_shock_15m

scoring:
  signal_score_threshold: 70
  components:
    trend: 30
    momentum: 30
    volatility: 20
    volume: 20

validation_plan:
  backtest:
    min_trades: 300
    target_win_rate_pct: 58
    target_profit_factor_min: 1.2
    target_avg_rr_min: 1.2
  forward_test:
    paper_days: 14
    max_drawdown_pct: 12

notes:
  - "Este archivo replica enfoque general, no una estrategia exacta de un trader concreto."
  - "Al recibir API Binance, regenerar con datos trade-by-trade para versión v2 realista."
